##############################################################
# AZ-305 Study Notes — GitHub Pages Configuration
# Theme: Just the Docs (direct gem, NOT remote_theme)
##############################################################
remote_theme: just-the-docs/just-the-docs

# ── Site identity ─────────────────────────────────────────
title: "AZ-305 Migration, HA & BCDR Deep Dive"
description: "AZ-305 Exam Prep — High Availability Design, Azure Backup, Site Recovery, Azure Migrate, AVS, and Migration Strategies: product overviews, RTO/RPO tables, decision trees, and exam caveats."
author: "Marco Grimaldi"
tagline: "Azure Solutions Architect Expert — Exam Prep"
logo: "/assets/images/logo-sunrise-domain.jpg"

# ── URLs ──────────────────────────────────────────────────
url: "https://marcogrimaldi29.com"
baseurl: "/az-305-bcdr"

# ── Personal website back-link ────────────────────────────
personal_site_url:   "https://marcogrimaldi29.com"
personal_site_label: "marcogrimaldi29.com"

# ── GitHub repo (for "Edit this page" links) ──────────────
gh_edit_link:         true
gh_edit_link_text:    "Edit this page on GitHub ✏️"
gh_edit_repository:   "https://github.com/marcogrimaldi29/az-305-bcdr"
gh_edit_branch:       "main"
gh_edit_view_mode:    "edit"

# Search
color_scheme:           dark
search_enabled:         true
search:
  heading_level:        2
  previews:             3
  preview_words_before: 5
  preview_words_after:  10
  tokenizer_separator:  /[\s/]+/
  rel_url:              true
  button:               false

# Navigation
nav_sort: case_sensitive
nav_external_links:
  - title: marcogrimaldi29.com
    url: https://marcogrimaldi29.com
  - title: "📘 AZ-305 Study Notes"
    url: https://marcogrimaldi29.com/az-305-study-notes/
  - title: "🥽 AZ-305: Azure Compute Services — Deep Dive"
    url: https://marcogrimaldi29.com/az-305-compute/
  - title: "🥽 AZ-305: Azure Messaging Services — Deep Dive"
    url: https://marcogrimaldi29.com/az-305-messaging/
  - title: "🥽 AZ-305: Data & Analytics Services — Deep Dive"
    url: https://marcogrimaldi29.com/az-305-data-analytics/
  - title: "📘 AZ-104 Study Notes"
    url: https://marcogrimaldi29.com/az-104-study-notes/
#  - title: "🏠 marcogrimaldi29.com"
#    url:   "https://marcogrimaldi29.com"

# ── Back to top button ───────────────────────────────────────────────
back_to_top:      true
back_to_top_text: "Back to top ↑"

# Aux links (top-right corner)
aux_links:
  "🌐 marcogrimaldi29.com":
    - "https://marcogrimaldi29.com"
  "📘 AZ-305 Main Notes":
    - "https://marcogrimaldi29.com/az-305-study-notes/"

aux_links_new_tab: true

# Footer
footer_content: >
  Maintained by <a href="https://www.linkedin.com/in/marco-grimaldi29/">Marco Grimaldi</a>.
  Not affiliated with or endorsed by Microsoft. All content for study purposes only.
  Theme: <a href="https://github.com/just-the-docs/just-the-docs">Just the Docs</a> (MIT).
  Built with <a href="https://jekyllrb.com/">Jekyll</a> and hosted on <a href="https://pages.github.com/">GitHub Pages</a>.
  <br>

# ── Mermaid diagram support ───────────────────────────────
# Just the Docs handles Mermaid loading automatically when `mermaid: true`
# is set in a page's front matter. Do NOT also call mermaid.initialize()
# in head_custom.html — that causes a double-init race that breaks diagrams.
mermaid:
  version: "10.9.0"

# ── Timestamps ────────────────────────────────────────────
last_edit_timestamp:  true
last_edit_time_format: "%d %b %Y"

# ── Plugins ───────────────────────────────────────────────
# FIX: Removed jekyll-github-metadata — it hits the GitHub API during CI
# without a token, causing build timeouts and failures.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
